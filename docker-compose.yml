services:
  postgres:
    image: postgres:16
    container_name: activation-sms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activation_sms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d activation_sms"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
